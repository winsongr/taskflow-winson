info:
  name: Login
  type: http
  seq: 2

http:
  method: POST
  url: http://localhost:8080/auth/login
  body:
    type: json
    data: |-
      {
        "email": "test@example.com",
        "password": "password123"
      }
  auth: none

runtime:
  scripts:
    - type: after-response
      code: |-
        if (res.status === 200) {
          bru.setVar("token", res.body.token);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
